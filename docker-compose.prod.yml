services:
  # LITESTAR BACKEND
  backend:
    container_name: aestelo_litestar_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - temp_uploads:/app/uploads_tmp
    restart: always

  # SAQ Worker Service
  worker:
    build: ./backend
    #TODO: Replace 'app.worker:queue' with actual SAQ worker entry point (when setup)
    command: saq app.worker:queue 
    restart: always
    depends_on:
      - backend

volumes:
  temp_uploads:
