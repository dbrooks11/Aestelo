services:
  # --- LITESTAR BACKEND --- #
  backend:
    container_name: aestelo_backend
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - venv_data:/app/.venv
      - temp_uploads:/app/uploads_tmp 
    command: litestar --app app.main:app run --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      

  # --- POSTGRES DATABASE ---#  
  db:
    image: postgis/postgis:18-3.6
    container_name: aestelo_db
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_DB}
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  pgadmin:
    image: dpage/pgadmin4
    container_name: aestelo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DB_PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  # --- REACT FRONTEND ---
  frontend:
    container_name: aestelo_frontend
    build: 
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      - NODE_ENV=${VITE_ENV}
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules 
    depends_on:
      - backend
    env_file:
      - .env
  
  #--- REDIS ---#
  redis:
    image: redis:7-alpine
    container_name: aestelo_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data 
  
  redisinsight:
    image: redis/redisinsight:latest
    container_name: aestelo_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  venv_data:
    name: aestelo_backend_venv
  node_modules:
    name: aestelo_frontend_node_modules
  temp_uploads:
    name: aestelo_backend_temp_uploads
  redis_data:
    name: aestelo_redis_data
  postgres_data:
    name: aestelo_db
  pgadmin_data:
    name: aestelo_pgadmin