services:
  # --- FLASK BACKEND --- #
  backend:
    container_name: aestelo_backend
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp 
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SSD_TMP_DIR=/app/uploads_tmp
    command: flask run --host=0.0.0.0 --debug
    env_file:
      - ./backend/.env.development
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  #---- CELERY ----#
  celery_worker_heavy:
    build: ./backend
    container_name: aestelo_celery_heavy
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp
    command: celery -A make_celery.celery_app worker -Q media_processing --loglevel=info --concurrency=4
    environment:
      - FLASK_ENV=development 
      - SSD_TMP_DIR=/app/uploads_tmp
    env_file:
      - ./backend/.env.development
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD-SHELL", "celery -A make_celery.celery_app inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker_light:
    build: ./backend
    container_name: aestelo_celery_light
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp
    command: celery -A make_celery.celery_app worker -Q default,high_priority --loglevel=info --concurrency=4
    environment:
      - FLASK_ENV=development 
      - SSD_TMP_DIR=/app/uploads_tmp
    env_file:
      - ./backend/.env.development
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD-SHELL", "celery -A make_celery.celery_app inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- REACT FRONTEND ---
  frontend:
    container_name: aestelo_frontend
    build: 
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules 
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
    env_file:
      - ./frontend/.env.development
  
  #--- REDIS ---#
  redis:
    image: redis/redis-stack:latest
    container_name: aestelo_redis_stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data 
  
  #--- FLOWER (for monitoring celery workers) ----#
  flower:
    build: ./backend
    container_name: aestelo_flower
    command: celery -A make_celery.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - FLASK_ENV=development
    env_file:
      - ./backend/.env.development
    depends_on:
      - redis
      - celery_worker_heavy
      - celery_worker_light
    volumes:
      - ./backend:/app

volumes:
  node_modules:
    name: aestelo_frontend_node_modules
  temp_uploads:
    name: aestelo_backend_temp_uploads
  redis_data:
    name: aestelo_redis_data