services:
  # --- FLASK BACKEND ---
  backend:
    container_name: aestelo_backend
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp 
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - UPLOAD_FOLDER=/app/uploads_tmp 
    command: flask run --host=0.0.0.0 --debug
    env_file:
      - ./backend/.env.development
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  #---- CELERY ----#
  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp
    command: celery -A make_celery.celery_app worker --loglevel=info --concurrency=2
    environment:
      - FLASK_ENV=development 
      - UPLOAD_FOLDER=/app/uploads_tmp
    env_file:
      - ./backend/.env.development
    depends_on:
      - backend
      - redis

  # --- REACT FRONTEND ---
  frontend:
    container_name: aestelo_frontend
    build: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules 
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.development
  
  #--- REDIS ---#
  redis:
    image: redis/redis-stack:latest
    container_name: aestelo_redis_stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data 
  
  #--- FLOWER (for monitoring celery workers) ----#
  flower:
    build: ./backend
    container_name: aestelo_flower
    command: celery -A make_celery.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - FLASK_ENV=development
    env_file:
      - ./backend/.env.development
    depends_on:
      - redis
      - celery_worker
    volumes:
      - ./backend:/app

volumes:
  node_modules:
    name: aestelo_frontend_node_modules
  temp_uploads:
    name: aestelo_backend_temp_uploads
  redis_data:
    name: aestelo_redis_data