services:
  # --- FLASK BACKEND --- #
  backend:
    container_name: aestelo_backend
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp 
    command: flask run --host=0.0.0.0 --debug
    restart: unless-stopped
    env_file:
      - ./backend/.env.development
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  #---- CELERY ----#
  celery_worker_heavy:
    build: ./backend
    container_name: aestelo_celery_heavy
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp
    command: celery -A tasks.make_celery.celery_app worker -Q media_processing --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env.development
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.make_celery.celery_app inspect ping -d celery@aestelo_celery_heavy --timeout=10 2>&1 | grep -E 'celery@aestelo_celery_heavy.*OK|pong' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  celery_worker_light:
    build: ./backend
    container_name: aestelo_celery_light
    volumes:
      - ./backend:/app
      - temp_uploads:/app/uploads_tmp
    command: celery -A tasks.make_celery.celery_app worker -Q default,high_priority --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env.development
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.make_celery.celery_app inspect ping -d celery@aestelo_celery_light --timeout=10 2>&1 | grep -E 'celery@aestelo_celery_light.*OK|pong' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # --- REACT FRONTEND ---
  frontend:
    container_name: aestelo_frontend
    build: 
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules 
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.development
  
  #--- REDIS ---#
  redis:
    image: redis/redis-stack:latest
    container_name: aestelo_redis_stack
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data 
  
  #--- FLOWER (for monitoring celery workers) ----#
  flower:
    build: ./backend
    container_name: aestelo_flower
    command: celery -A tasks.make_celery.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env.development
    depends_on:
      - redis
      - celery_worker_heavy
      - celery_worker_light
    volumes:
      - ./backend:/app

volumes:
  node_modules:
    name: aestelo_frontend_node_modules
  temp_uploads:
    name: aestelo_backend_temp_uploads
  redis_data:
    name: aestelo_redis_data